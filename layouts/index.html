{{ define "main" }}
<section class="home">
    <ul class="list__items">
    {{ range first 20 (where .Site.RegularPages "Section" "post") }}
        <li class="list__item">
            <a href="{{ .RelPermalink }}" class="list__item-title">{{ .Title }}</a>
            <time class="list__item-date">{{ .Date.Format "Jan 02, 2006" }}</time>
        </li>
    {{ end }}
    </ul>
</section>
{{ end }}
