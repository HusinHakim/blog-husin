<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 340" font-family="ui-monospace, Menlo, Consolas, monospace">
  <defs>
    <marker id="arrGreen" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#859900"/>
    </marker>
    <marker id="arrRed" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#dc322f"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="460" y="28" text-anchor="middle" font-size="16" fill="#073642" font-weight="bold">
    Architectural fitness function: one rule, two outcomes
  </text>

  <!-- ============================================ -->
  <!-- LANE 1 (top): bad MR, blocked -->
  <!-- ============================================ -->
  <g transform="translate(0, 60)">
    <!-- Left: MR card with bad code -->
    <rect x="20" y="0" width="280" height="90" rx="8" fill="#ffffff" stroke="#dc322f" stroke-width="2"/>
    <text x="160" y="22" text-anchor="middle" font-size="12" fill="#073642" font-weight="bold">MR adds ORM to a view</text>
    <text x="35" y="50" font-size="11" fill="#586e75">def list_pengajuan(req):</text>
    <text x="50" y="68" font-size="11" fill="#dc322f">  Pengajuan.objects.filter(...)</text>
    <text x="50" y="82" font-size="10" fill="#586e75">  return Response(...)</text>

    <!-- Arrow into gate -->
    <path d="M 300 45 L 388 45" stroke="#586e75" stroke-width="1.6" fill="none" marker-end="url(#arrRed)"/>

    <!-- Middle: gate -->
    <rect x="390" y="10" width="170" height="70" rx="6" fill="#fff59d" stroke="#b58900" stroke-width="2"/>
    <text x="475" y="38" text-anchor="middle" font-size="13" fill="#073642" font-weight="bold">fitness function</text>
    <text x="475" y="58" text-anchor="middle" font-size="10" fill="#586e75">checks: no .objects.</text>
    <text x="475" y="72" text-anchor="middle" font-size="10" fill="#586e75">in views layer</text>

    <!-- Arrow out red -->
    <path d="M 560 45 L 648 45" stroke="#dc322f" stroke-width="2" stroke-dasharray="6,3" fill="none" marker-end="url(#arrRed)"/>

    <!-- Right: blocked outcome -->
    <rect x="650" y="0" width="250" height="90" rx="8" fill="#fdf6e3" stroke="#dc322f" stroke-width="2"/>
    <circle cx="690" cy="45" r="16" fill="#dc322f"/>
    <text x="690" y="51" text-anchor="middle" font-size="18" fill="#ffffff" font-weight="bold">X</text>
    <text x="720" y="38" font-size="13" fill="#dc322f" font-weight="bold">Pipeline red</text>
    <text x="720" y="56" font-size="11" fill="#586e75">Merge button disabled.</text>
    <text x="720" y="72" font-size="11" fill="#586e75">Author moves query</text>
    <text x="720" y="86" font-size="11" fill="#586e75">to repository, retries.</text>
  </g>

  <!-- Divider -->
  <line x1="40" y1="178" x2="880" y2="178" stroke="#eee8d5" stroke-width="1"/>

  <!-- ============================================ -->
  <!-- LANE 2 (bottom): good MR, merged -->
  <!-- ============================================ -->
  <g transform="translate(0, 200)">
    <!-- Left: MR card with good code -->
    <rect x="20" y="0" width="280" height="90" rx="8" fill="#ffffff" stroke="#859900" stroke-width="2"/>
    <text x="160" y="22" text-anchor="middle" font-size="12" fill="#073642" font-weight="bold">MR uses the repository</text>
    <text x="35" y="50" font-size="11" fill="#586e75">def list_pengajuan(req):</text>
    <text x="50" y="68" font-size="11" fill="#859900">  PengajuanRepository.list()</text>
    <text x="50" y="82" font-size="10" fill="#586e75">  return Response(...)</text>

    <!-- Arrow into gate -->
    <path d="M 300 45 L 388 45" stroke="#586e75" stroke-width="1.6" fill="none" marker-end="url(#arrGreen)"/>

    <!-- Middle: gate (same as top) -->
    <rect x="390" y="10" width="170" height="70" rx="6" fill="#fff59d" stroke="#b58900" stroke-width="2"/>
    <text x="475" y="38" text-anchor="middle" font-size="13" fill="#073642" font-weight="bold">fitness function</text>
    <text x="475" y="58" text-anchor="middle" font-size="10" fill="#586e75">checks: no .objects.</text>
    <text x="475" y="72" text-anchor="middle" font-size="10" fill="#586e75">in views layer</text>

    <!-- Arrow out green -->
    <path d="M 560 45 L 648 45" stroke="#859900" stroke-width="2" fill="none" marker-end="url(#arrGreen)"/>

    <!-- Right: merged outcome -->
    <rect x="650" y="0" width="250" height="90" rx="8" fill="#fdf6e3" stroke="#859900" stroke-width="2"/>
    <circle cx="690" cy="45" r="16" fill="#859900"/>
    <text x="690" y="52" text-anchor="middle" font-size="16" fill="#ffffff" font-weight="bold">✓</text>
    <text x="720" y="38" font-size="13" fill="#859900" font-weight="bold">Pipeline green</text>
    <text x="720" y="56" font-size="11" fill="#586e75">Merge unblocked,</text>
    <text x="720" y="72" font-size="11" fill="#586e75">change reaches main</text>
    <text x="720" y="86" font-size="11" fill="#586e75">with the rule intact.</text>
  </g>
</svg>
